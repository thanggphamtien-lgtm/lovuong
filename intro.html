<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Intro</title>

  <link rel="stylesheet" href="intro.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MÀN HÌNH BẮT XOAY + FULLSCREEN -->
<div id="fsGate">
  <div class="fsBox">
    <p>📱 Vui lòng xoay ngang màn hình</p>
    <button id="fsBtn">BẤM ĐỂ VÀO</button>
  </div>
</div>

<!-- NỘI DUNG ANIMATION -->
<div id="mainContent" style="display:none;">
  <canvas id="canvas"></canvas>
</div>

<script src="app.js"></script>
<script src="intro.js"></script>

<script>
const fsGate = document.getElementById("fsGate");
const fsBtn = document.getElementById("fsBtn");
const mainContent = document.getElementById("mainContent");

function isMobile(){
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

// PC → vào luôn
if(!isMobile()){
  fsGate.style.display = "none";
  mainContent.style.display = "block";
  startAnimation();
}

// Mobile → kiểm tra xoay ngang
function checkOrientation(){
  if(window.innerWidth > window.innerHeight){
    fsBtn.disabled = false;
    fsBtn.innerText = "BẤM ĐỂ VÀO";
  } else {
    fsBtn.disabled = true;
    fsBtn.innerText = "XOAY NGANG MÀN HÌNH";
  }
}

window.addEventListener("resize", checkOrientation);
checkOrientation();

// Click duy nhất để fullscreen + chạy anim
fsBtn.addEventListener("click", async ()=>{
  if(isMobile()){
    if (!document.fullscreenElement) {
      await document.documentElement.requestFullscreen().catch(()=>{});
    }

    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock("landscape").catch(()=>{});
    }
  }

  fsGate.style.display = "none";
  mainContent.style.display = "block";

  startAnimation();
});
</script>

</body>
</html>
