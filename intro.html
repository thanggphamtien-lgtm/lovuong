<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
<link rel="stylesheet" href="intro.css">
<title>Happy New Year 2026</title>

<style>
/* màn hình yêu cầu fullscreen */
#fsGate{
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 99999;
}

#fsBtn{
  font-size: 24px;
  padding: 20px 40px;
  border: none;
  border-radius: 12px;
  background: gold;
  color: black;
}
</style>
</head>

<body>

<!-- GATE FULLSCREEN -->
<div id="fsGate">
  <button id="fsBtn">BẤM ĐỂ VÀO TOÀN MÀN HÌNH</button>
</div>

<!-- NỘI DUNG ANIMATION (giữ nguyên code của bạn) -->
<div class="box-slider" id="mainContent" style="display:none;">

    <!-- ====== GIỮ NGUYÊN TOÀN BỘ CODE CŨ CỦA BẠN ====== -->

    <!-- (mình giữ nguyên nội dung intro.html bạn gửi, chỉ bọc trong mainContent) -->

    <!-- Dán toàn bộ phần .box-slider của bạn vào đây -->
    
</div>

<audio id="song">
  <source src="image/TetBinhAnRemix-HanaCamTien9CMedia-8539226.mp3" type="audio/mp3">
</audio>

<script src="intro.js"></script>

<script>
const fsGate = document.getElementById("fsGate");
const fsBtn = document.getElementById("fsBtn");
const mainContent = document.getElementById("mainContent");

function isMobile(){
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

// PC: chạy luôn
if(!isMobile()){
  fsGate.style.display = "none";
  mainContent.style.display = "block";
}

// Mobile: bấm mới chạy
fsBtn.onclick = async ()=>{
  if(document.documentElement.requestFullscreen){
    await document.documentElement.requestFullscreen().catch(()=>{});
  }

  if(screen.orientation && screen.orientation.lock){
    screen.orientation.lock("landscape").catch(()=>{});
  }

  fsGate.style.display = "none";
  mainContent.style.display = "block";
};
</script>

</body>
</html>
