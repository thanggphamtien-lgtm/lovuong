<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Intro</title>
<link rel="stylesheet" href="intro.css">
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:black;
  overflow:hidden;
}
#gate{
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:22px;
}
#gate button{
  margin-top:20px;
  padding:15px 30px;
  font-size:20px;
}
#main{
  display:none;
}
</style>
</head>

<body>

<div id="gate">
  📱 Vui lòng xoay ngang màn hình
  <button id="btn">BẤM ĐỂ VÀO</button>
</div>

<div id="main">
  <!-- giữ nguyên canvas / animation của bạn -->
</div>

<script src="intro.js"></script>

<script>
const gate = document.getElementById("gate");
const main = document.getElementById("main");
const btn = document.getElementById("btn");

function isMobile(){
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

function isLandscape(){
  return window.innerWidth > window.innerHeight;
}

// PC: vào thẳng animation
if(!isMobile()){
  gate.style.display = "none";
  main.style.display = "block";
  if(typeof startAnimation === "function"){
    startAnimation();
  }
}

// Mobile: chỉ chạy khi bấm nút
btn.onclick = async ()=>{
  if(!isLandscape()){
    alert("Vui lòng xoay ngang màn hình");
    return;
  }

  try{
    await document.documentElement.requestFullscreen();
  }catch(e){}

  gate.style.display = "none";
  main.style.display = "block";

  if(typeof startAnimation === "function"){
    startAnimation();
  }
};
</script>

</body>
</html>
