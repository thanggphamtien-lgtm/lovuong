<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Intro</title>
<link rel="stylesheet" href="intro.css">

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:black;
  overflow:hidden;
}

/* màn hình yêu cầu xoay */
#rotateScreen{
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:22px;
}

#rotateScreen button{
  margin-top:20px;
  padding:15px 35px;
  font-size:20px;
  background:red;
  color:white;
  border:none;
  border-radius:12px;
}
</style>
</head>

<body>

<div id="rotateScreen">
  📱 Vui lòng xoay ngang màn hình
  <button id="enterBtn">BẤM ĐỂ VÀO</button>
</div>

<!-- animation của bạn -->
<div id="mainContent" style="display:none;">
  <!-- giữ nguyên animation cũ ở đây -->
</div>

<script src="intro.js"></script>

<script>
const rotateScreen = document.getElementById("rotateScreen");
const enterBtn = document.getElementById("enterBtn");
const mainContent = document.getElementById("mainContent");

function isMobile(){
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

let fullscreenDone = false;

// PC: vào thẳng
if(!isMobile()){
  rotateScreen.style.display = "none";
  mainContent.style.display = "block";
}

// Mobile
function checkOrientation(){
  if(window.innerWidth > window.innerHeight){
    rotateScreen.style.display = "none";
    mainContent.style.display = "block";
  }else{
    rotateScreen.style.display = "flex";
    mainContent.style.display = "none";
  }
}

if(isMobile()){
  checkOrientation();
  window.addEventListener("resize", checkOrientation);
}

enterBtn.addEventListener("click", async ()=>{
  if(!fullscreenDone){
    try{
      await document.documentElement.requestFullscreen();
      fullscreenDone = true;
    }catch(e){
      console.log("Fullscreen bị chặn");
    }
  }
  checkOrientation();
});
</script>

</body>
</html>
