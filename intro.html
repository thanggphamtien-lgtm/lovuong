<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Intro</title>
<link rel="stylesheet" href="intro.css">

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:black;
  overflow:hidden;
}

#gate{
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:22px;
}

#gate button{
  margin-top:20px;
  padding:14px 30px;
  font-size:20px;
  background:red;
  color:white;
  border:none;
  border-radius:10px;
}

#mainContent{
  display:none;
}
</style>
</head>

<body>

<div id="gate">
  📱 Vui lòng xoay ngang màn hình
  <button id="enterBtn">BẤM ĐỂ VÀO</button>
</div>

<div id="mainContent">
  <!-- nội dung animation giữ nguyên -->
</div>

<script src="intro.js"></script>

<script>
const gate = document.getElementById("gate");
const mainContent = document.getElementById("mainContent");
const btn = document.getElementById("enterBtn");

function isMobile(){
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

function isLandscape(){
  return window.innerWidth > window.innerHeight;
}

// PC vào luôn
if(!isMobile()){
  gate.style.display = "none";
  mainContent.style.display = "block";
}

// Mobile xử lý
btn.onclick = async ()=>{
  if(isMobile()){
    if(!document.fullscreenElement){
      try{
        await document.documentElement.requestFullscreen();
      }catch(e){}
    }

    if(isLandscape()){
      gate.style.display = "none";
      mainContent.style.display = "block";
    }else{
      alert("Vui lòng xoay ngang màn hình");
    }
  }
};

window.addEventListener("resize", ()=>{
  if(isMobile()){
    if(isLandscape()){
      gate.style.display = "none";
      mainContent.style.display = "block";
    }else{
      gate.style.display = "flex";
      mainContent.style.display = "none";
    }
  }
});
</script>

</body>
</html>
