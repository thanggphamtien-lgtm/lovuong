<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Intro</title>
<link rel="stylesheet" href="intro.css">

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:black;
  overflow:hidden;
}

#rotateScreen{
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:22px;
}

#rotateScreen button{
  margin-top:20px;
  padding:15px 35px;
  font-size:20px;
  background:red;
  color:white;
  border:none;
  border-radius:12px;
}
</style>
</head>

<body>

<div id="rotateScreen">
  📱 Vui lòng xoay ngang màn hình
  <button id="enterBtn">BẤM ĐỂ VÀO</button>
</div>

<div id="mainContent">
  <!-- animation của bạn giữ nguyên ở đây -->
</div>

<script src="intro.js"></script>

<script>
const rotateScreen = document.getElementById("rotateScreen");
const enterBtn = document.getElementById("enterBtn");
const mainContent = document.getElementById("mainContent");

function isMobile(){
  return window.innerWidth <= 900;
}

function isLandscape(){
  return window.innerWidth > window.innerHeight;
}

// PC → vào luôn
if(!isMobile()){
  rotateScreen.style.display = "none";
  mainContent.style.display = "block";
}else{
  rotateScreen.style.display = "flex";
  mainContent.style.display = "none";
}

// bấm nút
enterBtn.addEventListener("click", async ()=>{
  if(document.fullscreenElement == null){
    try{
      await document.documentElement.requestFullscreen();
    }catch(e){}
  }

  if(isLandscape()){
    rotateScreen.style.display = "none";
    mainContent.style.display = "block";
  }else{
    alert("Vui lòng xoay ngang màn hình");
  }
});

// khi xoay máy
window.addEventListener("orientationchange", ()=>{
  if(isLandscape()){
    rotateScreen.style.display = "none";
    mainContent.style.display = "block";
  }else{
    rotateScreen.style.display = "flex";
    mainContent.style.display = "none";
  }
});
</script>

</body>
</html>
