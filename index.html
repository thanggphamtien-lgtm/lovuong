<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy New Year</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body{
      margin:0;
      overflow:hidden;
      background:black;
    }

    /* Ẩn giao diện countdown cũ */
    .wrapper{
      display:none !important;
    }

    #rotateNotice{
      position:fixed;
      inset:0;
      background:black;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      font-size:22px;
      z-index:9999;
    }

    #startBtn{
      position:fixed;
      inset:0;
      background:black;
      color:white;
      font-size:24px;
      border:none;
      display:none;
      z-index:9998;
    }
  </style>
</head>
<body>

<div id="rotateNotice">📱 Vui lòng xoay ngang màn hình</div>
<button id="startBtn">BẤM ĐỂ VÀO TOÀN MÀN HÌNH</button>

<script src="app.js"></script>
</body>
</html>
