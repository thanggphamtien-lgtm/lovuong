<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy New Year</title>
<link rel="stylesheet" href="style.css">

<style>
body {
  margin: 0;
  overflow: hidden;
}

/* ẨN countdown nếu còn tồn tại */
#countdown{
  display:none !important;
}

/* Màn hình yêu cầu xoay */
#rotateNotice {
  position: fixed;
  inset: 0;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 99999;
  font-size: 22px;
  text-align: center;
}

/* Nút fullscreen */
#startBtn {
  position: fixed;
  inset: 0;
  background: black;
  color: white;
  font-size: 24px;
  border: none;
  z-index: 99998;
  display: none;
}

/* Nội dung chính */
#mainContent {
  display: none;
}
</style>
</head>

<body>

<!-- Thông báo xoay màn hình -->
<div id="rotateNotice">
  📱 Vui lòng xoay ngang màn hình để tiếp tục
</div>

<!-- Nút fullscreen -->
<button id="startBtn">BẤM ĐỂ VÀO TOÀN MÀN HÌNH</button>

<!-- Nội dung web (rồng + pháo hoa) -->
<div id="mainContent">
  <!-- giữ nguyên code animation của bạn ở đây -->
</div>

<script>
let appLoaded = false;

const rotateNotice = document.getElementById("rotateNotice");
const startBtn = document.getElementById("startBtn");
const mainContent = document.getElementById("mainContent");

function isPortrait() {
  return window.innerHeight > window.innerWidth;
}

function loadApp() {
  if (appLoaded) return;
  const script = document.createElement("script");
  script.src = "app.js";
  document.body.appendChild(script);
  appLoaded = true;
}

function checkOrientation() {
  if (isPortrait()) {
    rotateNotice.style.display = "flex";
    startBtn.style.display = "none";
    mainContent.style.display = "none";
  } else {
    rotateNotice.style.display = "none";
    startBtn.style.display = "block";
  }
}

checkOrientation();
window.addEventListener("resize", checkOrientation);
window.addEventListener("orientationchange", checkOrientation);

startBtn.addEventListener("click", async () => {

  // fullscreen
  if (document.documentElement.requestFullscreen) {
    await document.documentElement.requestFullscreen();
  }

  // khóa xoay ngang
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock("landscape").catch(()=>{});
  }

  // ẨN countdown nếu còn
  const countdown = document.getElementById("countdown");
  if(countdown) countdown.style.display = "none";

  startBtn.style.display = "none";
  mainContent.style.display = "block";

  loadApp(); // chạy animation
});
</script>

</body>
</html>
